---
- name: Check if Python3 is already installed
  ansible.builtin.command: which python3
  register: py3_result
  ignore_errors: yes
  changed_when: false

- name: Install Python3
  ansible.builtin.raw: apk update --no-cache && apk add python3
  when: py3_result.rc is not defined or py3_result.rc != 0
  changed_when: true
